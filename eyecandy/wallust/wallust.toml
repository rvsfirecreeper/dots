backend = "fastresize"
palette = "dark16"
color_space = "labmixed"
checkcontrast = true
alpha = {{math opacity "*" 100}}
[templates]
hypr = { template = "hyprland.lua", target = "~/.config/hypr/colors.lua"}
btop = { template = "btop.theme", target = "~/.config/btop/themes/wallust.theme"}
kitty.template = "kitty.conf"
kitty.target = "~/.config/kitty/colors.conf"
pywal.template = "colors.json"
pywal.target = "~/.cache/wal/colors.json"
waybar.template = "waybar.css"
waybar.target = "~/.config/waybar/colors.css"
wezterm.template = "wezterm.toml"
wezterm.target = "~/.config/wezterm/colors/wallust.toml"
wofi.template = "waybar.css"
wofi.target = "~/.config/wofi/colors.css"
wlogout.template = "waybar.css"
wlogout.target = "~/.config/wlogout/colors.css"
waypaper.template = "waybar.css"
waypaper.target = "~/.config/waypaper/colors.css"
niri.template = "niri.kdl"
niri.target = "~/.config/niri/layout.kdl"
zed.template = "zed.json"
zed.target = "~/.config/zed/themes/wallust.json"
quickshell = { template = "colors.qml", target = "~/.config/quickshell/Colors.qml"}
gtk = { template = "gtk.css", target = "~/.themes/wallust/gtk-3.0/gtk.css"}
