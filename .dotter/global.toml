[helpers]

[default]
depends = []

[default.files]

# Sh's/profile

"rc/profile" = "~/.profile"
"rc/zshrc" = "~/.zshrc"
"rc/bashrc" = "~/.bashrc"
"rc/config.fish" = "~/.config/fish/config.fish"

# Decoration

"decor/fastfetch" = "~/.config/fastfetch"
"decor/hypr" = "~/.config/hypr"
"decor/starship.toml" = "~/.config/starship.toml"
"wallpaper" = { target = "~/.wallpaper", type = "symbolic" }
"decor/wallust/templates" = { target = "~/.config/wallust/templates", type = "symbolic" }
"decor/wallust/wallust.toml" = "~/.config/wallust/wallust.toml"
"decor/quickshell" = "~/.config/quickshell"
# Functional Utilities

"utils/kanata" = "~/.config/kanata"
"utils/btop" = "~/.config/btop"
"utils/wofi" = "~/.config/wofi"
"utils/wezterm" = "~/.config/wezterm"
"utils/helix" = "~/.config/helix"
"utils/nushell" = "~/.config/nushell"
"utils/niri" = "~/.config/niri"
"utils/waypaper/style.css" = "~/.config/waypaper/style.css"
"scripts" = "~/.scripts"
[default.variables]
font = "JetBrainsMono Nerd Font"
fsize = 13
lfsize = 20
opacity = 0.9
terminal = 'wezterm'
[settings]
default_target_type = "automatic"
