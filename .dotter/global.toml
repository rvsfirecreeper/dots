[helpers]

[default]
depends = []

[default.files]

# Shells

"shell/profile" = "~/.profile"
"shell/zshrc" = "~/.zshrc"
"shell/bashrc" = "~/.bashrc"
"shell/config.fish" = "~/.config/fish/config.fish"
"shell/nushell" = "~/.config/nushell"

# Eyecandy

"eyecandy/fastfetch" = "~/.config/fastfetch"
"eyecandy/starship.toml" = "~/.config/starship.toml"
"wallpaper" = { target = "~/.wallpaper", type = "symbolic" }
"eyecandy/wallust/templates" = { target = "~/.config/wallust/templates", type = "symbolic" }
"eyecandy/wallust/wallust.toml" = "~/.config/wallust/wallust.toml"
"eyecandy/waypaper/style.css" = "~/.config/waypaper/style.css"

# Core

"core/hypr" = "~/.config/hypr"
"core/quickshell" = "~/.config/quickshell"
"core/wezterm" = "~/.config/wezterm"

# Other Utilities

"utils/kanata" = "~/.config/kanata"
"utils/btop" = "~/.config/btop"
"utils/wofi" = "~/.config/wofi"
"utils/helix" = "~/.config/helix"
"scripts" = "~/.scripts"

[default.variables]
font = "JetBrainsMono Nerd Font"
font_size = 13
large_font_size = 20
opacity = 0.95
is_pill = true
terminal = 'wezterm'
[settings]
default_target_type = "automatic"
